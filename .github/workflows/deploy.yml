name: Deploy to Azure Container Instance

on:
  workflow_dispatch:

env:
  ACR_NAME: mernappacr
  ACR_LOGIN_SERVER: mernappacr.azurecr.io
  FRONTEND_IMAGE: frontend:latest
  BACKEND_IMAGE: backend:latest
  CONTAINER_GROUP_NAME: mernapp-group
  RESOURCE_GROUP: mern-app-rg

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: |
          echo "Logging in to Azure Container Registry..."
          az acr login --name $ACR_NAME
          echo "Login to ACR successful."

      - name: Substitute variables in container-group.yml
        run: |
          echo "Substituting variables in container-group.yml..."
          sed -e "s|\$ACR_LOGIN_SERVER|${ACR_LOGIN_SERVER}|g" \
              -e "s|\$FRONTEND_IMAGE|${FRONTEND_IMAGE}|g" \
              -e "s|\$BACKEND_IMAGE|${BACKEND_IMAGE}|g" \
              -e "s|\$ACR_USERNAME|${{ secrets.ACR_USERNAME }}|g" \
              -e "s|\$ACR_PASSWORD|${{ secrets.ACR_PASSWORD }}|g" \
              container-group.yml > container-group-resolved.yml
          echo "Substitution complete."

      - name: Print resolved container group file
        run: |
          echo "Contents of container-group-resolved.yml:"
          cat container-group-resolved.yml

      - name: Deploy to Azure Container Instances
        run: |
          echo "Creating container group..."
          az container create \
            --resource-group $RESOURCE_GROUP \
            --file container-group-resolved.yml \
            --name $CONTAINER_GROUP_NAME \
            --registry-login-server $ACR_LOGIN_SERVER \
            --registry-username ${{ secrets.ACR_USERNAME }} \
            --registry-password ${{ secrets.ACR_PASSWORD }} \
            --output json || { echo 'Deployment failed'; exit 1; }
          echo "Container group created successfully."

      - name: Check deployment status
        run: |
          echo "Checking deployment status..."
          az container show --resource-group $RESOURCE_GROUP --name $CONTAINER_GROUP_NAME --output table
